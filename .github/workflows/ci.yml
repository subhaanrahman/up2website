name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Use repo secret VITE_STRIPE_PUBLISHABLE_KEY if set; else placeholder so build succeeds
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
