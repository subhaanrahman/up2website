name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Guard Supabase project ref (optional)
        env:
          SUPABASE_EXPECTED_PROJECT_ID: ${{ secrets.SUPABASE_EXPECTED_PROJECT_ID }}
        run: bash scripts/region-migration/check-project-ref.sh

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npx eslint .

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Use repo secret VITE_STRIPE_PUBLISHABLE_KEY if set; else placeholder so build succeeds
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          # Optional: Sentry browser DSN for error reporting in built assets (see docs/TESTING_GUIDE.md)
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

  e2e:
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        env:
          CI: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          if [ -z "${VITE_SUPABASE_URL:-}" ] || [ -z "${VITE_SUPABASE_PUBLISHABLE_KEY:-}" ]; then
            echo "::notice::Skipping E2E — add repository secrets VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY (same values as local .env)."
            exit 0
          fi
          npm run test:e2e
