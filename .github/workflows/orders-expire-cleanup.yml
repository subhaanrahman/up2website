# Invokes Supabase Edge Function `orders-expire-cleanup` on a timer so reserved
# orders past `expires_at` are marked expired and Stripe PIs are cancelled.
# Requires repository secrets (same project as production/staging Supabase):
#   VITE_SUPABASE_URL — project URL (e.g. https://xxxx.supabase.co)
#   CRON_SECRET — must match Edge secret CRON_SECRET on the Supabase project
#
# See docs/PAYMENT_FLOW.md — Expired order cleanup

name: orders-expire-cleanup

on:
  schedule:
    # Every 15 minutes UTC (align with PAYMENT_FLOW.md 5–15 min guidance)
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  invoke:
    runs-on: ubuntu-latest
    steps:
      - name: POST Edge Function
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::Set repository secrets VITE_SUPABASE_URL and CRON_SECRET (must match Supabase Edge secret CRON_SECRET). See .github/workflows/orders-expire-cleanup.yml"
            exit 1
          fi
          base="${SUPABASE_URL%/}"
          code="$(curl -sS -o /tmp/cron-body.json -w "%{http_code}" -X POST \
            "${base}/functions/v1/orders-expire-cleanup" \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}')"
          echo "HTTP ${code}"
          cat /tmp/cron-body.json
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            exit 1
          fi
